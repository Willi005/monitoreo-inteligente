<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2AA0FF"/>
      <stop offset="1" stop-color="#0057C8"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0.1" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E6F1FF"/>
    </linearGradient>
  </defs>

  <!-- squircle glass -->
  <rect x="64" y="64" width="896" height="896" rx="232" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="232" fill="url(#glass)"/>

